version: 2

updates:
  # Root workspace (turbo, prettier, shared tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns: ['turbo', 'prettier']

  # API app
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 10
    groups:
      fastify:
        patterns: ['fastify', '@fastify/*']
      prisma:
        patterns: ['prisma', '@prisma/*']

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ['react', 'react-dom', 'react-*', '@types/react*']
      tanstack:
        patterns: ['@tanstack/*']
      vite:
        patterns: ['vite', '@vitejs/*']

  # Shared tsconfig package
  - package-ecosystem: npm
    directory: /packages/tsconfig
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
